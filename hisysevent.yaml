domain: AV_CODEC

CODEC_START_INFO:
  __BASE: {type: BEHAVIOR, level: CRITICAL, desc: AV_CODEC codec start event}
  VIDEO_WIDTH: {type: INT32, desc: Video codec input width}
  AUDIO_CHANNEL_COUNT: {type: INT32, desc: Audio codec input channel count}
  AUDIO_SAMPLE_RATE: {type: INT32, desc: Audio codec input sample rate}
  VIDEO_PIXEL_FORMAT: {type: STRING, desc: Video codec input pixel format}
  VIDEO_FRAMERATE: {type: DOUBLE, desc: Video codec output framerate}
  CLIENT_UID: {type: INT32, desc: Codec client uid}
  CODEC_MODE: {type: STRING, desc: Buffer mode or Surface mode}
  CODEC_NAME: {type: STRING, desc: Codec name}
  CODEC_IS_VENDOR: {type: STRING, desc: True is hardware codec or false is software codec}
  VIDEO_HEIGHT: {type: INT32, desc: Video codec input height}
  ENCODER_BITRATE: {type: INT64, desc: Encoder output bitrate}
  CODEC_INSTANCE_ID: {type: INT32, desc: Codec instance id}
  CLIENT_PID: {type: INT32, desc: Codec client pid}

CODEC_STOP_INFO:
  __BASE: {type: BEHAVIOR, level: CRITICAL, desc: AV_CODEC codec stop event, preserve: true}
  CLIENT_PID: {type: INT32, desc: Codec client pid}
  CODEC_INSTANCE_ID: {type: INT32, desc: Codec instance id}
  CLIENT_UID: {type: INT32, desc: Codec client uid}

FAULT:
  __BASE: {type: FAULT, level: CRITICAL, desc: AV_CODEC fault, preserve: true}
  MODULE: {type: STRING, desc: Module name}
  MSG: {type: STRING, desc: Fault description}
  FAULTTYPE: {type: STRING, desc: Fault type}

STATISTICS_INFO:
  __BASE: {type: STATISTIC, level: CRITICAL, desc: AVCodec statistics event info, preserve: true}
  QUERY_CAP_TIMES: {type: UINT32, desc: Number of capability query requests}
  CREATE_CODEC_TIMES: {type: UINT32, desc: Number of video codec creations}
  CODEC_SPECIFIED_INFO: {type: STRING, desc: specification information of video codec creation}
  APP_NAME_DICT: {type: STRING, desc: Dictionary of application names invoking the codec}
  CAP_UNSUPPORTED_INFO: {type: STRING, desc: Unsupported capability specification information}
  DEC_ABNORMAL_OCCUPATION_INFO: {type: STRING, desc: Statistics on application exceptions occupying decoders}
  SPEED_DECODING_INFO: {type: STRING, desc: Statistics on playback speed decoding}
  CODEC_ERROR_INFO: {type: STRING, desc: Statistics on codec exceptions}
  